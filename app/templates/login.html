{% extends 'base.html' %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="auth-layout auth-modern">
  <div class="auth-panel card shadow-lg">
    <div class="d-flex align-items-center gap-3 mb-3">
      <div class="brand-mark large">T</div>
      <div>
        <h1 class="h3 mb-1">تسجيل الدخول</h1>
        <p class="text-secondary mb-0">دخول مقيّد للمستخدمين المعتمدين من المدير.</p>
      </div>
    </div>
    <form method="post" class="mt-4" autocomplete="on">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-control form-control-lg mb-3" type="email" name="email" placeholder="name@example.com" required autofocus autocomplete="username">

      <div class="d-flex justify-content-between align-items-center">
        <label class="form-label mb-1">كلمة المرور</label>
        <small class="text-secondary">🔐 محمي بالصلاحيات</small>
      </div>
      <div class="password-field mb-3">
        <input id="passwordInput" class="form-control form-control-lg" type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        <button type="button" class="password-toggle" id="passwordToggle" aria-label="إظهار كلمة المرور" title="إظهار كلمة المرور">👁️</button>
      </div>

      <label class="form-check mb-4">
        <input class="form-check-input" type="checkbox" name="remember" value="1">
        <span class="form-check-label">تذكرني على هذا الجهاز</span>
      </label>
      <button class="btn btn-primary btn-lg w-100">دخول</button>
    </form>
    <div class="auth-note mt-4">بعد 5 محاولات خاطئة يتم قفل الحساب مؤقتاً لمدة 15 دقيقة.</div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  const input = document.getElementById('passwordInput');
  const btn = document.getElementById('passwordToggle');
  if(!input || !btn) return;
  btn.addEventListener('click', function(){
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁️';
    btn.setAttribute('aria-label', show ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
  });
})();
</script>
{% endblock %}

{% extends 'base.html' %}{% block content %}<h2>مدير الروابط</h2><form method="post" class="card p-3 mb-4"><textarea name="text" rows="7" class="form-control" placeholder="الصق الروابط المختلطة"></textarea><button class="btn btn-primary mt-3">فرز الروابط</button></form>{% for kind,title in [('telegram','تيليجرام'),('whatsapp','واتساب'),('other','أخرى')] %}<div class="card mb-3"><div class="card-header">{{ title }} ({{ grouped[kind]|length }})</div><ul class="list-group list-group-flush">{% for link in grouped[kind] %}<li class="list-group-item text-break">{{ link.url }}</li>{% endfor %}</ul></div>{% endfor %}{% endblock %}
